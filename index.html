<!DOCTYPE html>
<html lang="en">
    <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width", initial-scale="1.0">
    <title>Quiz App | Trent</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #b22234 0%, #002868 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 1.5rem;
        }

        .quiz-container {
            background: white;
            max-width: 700px;
            width: 100%;
            border-radius: 2rem;
            padding: 2rem;
            box-shadow: 0 20px 35px -10px rgba(0, 0, 0, 0.3);
            transition: transform 0.2s ease;
        }

        .quiz-container:hover {
            transform: scale(1.01);
        }

        h1 {
            font-size: 2rem;
            font-weight: 700;
            text-align: center;
            color: #b22234;
            border-bottom: 3px solid #002868;
            display: inline-block;
            width: 100%;
            padding-bottom: 0.5rem;
            margin-bottom: 1.5rem;
        }

        .quiz-header {
            display: flex;
            justify-content: space-between;
            background: #f0f0f0;
            padding: 0.8rem 1.2rem;
            border-radius: 2rem;
            margin-bottom: 2rem;
            font-weight: bold;
        }

        .score {
            color: #b22234;
            background: white;
            padding: 0.2rem 0.8rem;
            border-radius: 2rem;
        }

        .question-number {
            color: #002868;
            background: white;
            padding: 0.2rem 0.8rem;
            border-radius: 2rem;
        }

        .question {
            font-size: 1.6rem;
            font-weight: 600;
            color: #1e2a3e;
            margin-bottom: 2rem;
            line-height: 1.3;
            text-align: center;
        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .option {
            background: #f8f9fa;
            border: 2px solid #dee2e6;
            border-radius: 1rem;
            font-weight: 500;
            text-align: left;
            cursor: pointer;
            transition: all 0.2s ease;
            color: #212529;
        }

        .option:hover {
            background: #e9ecef;
            border-color: #b22234;
            transform: translateX(5px);
        }

        .option.correct {
            background: #28a745;
            border-color: #28a745;
            color: white;
        }

        .option.wrong {
            background: #b22234;
            border-color: #b22234;
            color: white;
        }

        .next-btn {
            background: #002868;
            color: white;
            border: none;
            border-radius: 3rem;
            padding: 1rem;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            transition: background 0.2s ease;
        }

        .next-btn:hover {
            background: #b22234;
        }

        .result-screen {
            text-align: center;
        }

        .result-screen h2 {
            color: #b22234;
            margin-bottom: 1rem;
        }

        .final-score {
            font-size: 2rem;
            font-weight: bold;
            background: #002868;
            color: white;
            display: inline-block;
            padding: 0.5rem 1.5rem;
            border-radius: 3rem;
            margin: 1rem 0;
        }

        .restart-btn {
            background: #b22234;
            color: white;
            border: none;
            border-radius: 2rem;
            padding: 0.8rem 1rem;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            margin-top: 1rem;
        }

        .restart-btn:hover {
            background: #8b1a1a;
        }

        .option.disabled {
            pointer-events: none;
            opacity: 0.7;
        }

        @media (max-width: 550px) {
            .quiz-container {
                padding: 1.2rem;
            }
            .question {
                font-size: 1.3rem
            }
            .option {
                padding: 0.7rem;
            }
        }
    </style>
    </head>
<body>
    <div class="quiz-container">
        <h1> Quiz App</h1>
        
        <div class="quiz-header">
            <div class="score" id="score">Score: 0</div>
            <div class="question-number" id="question-number">Question 1 / 5</div>
        </div>
        <!-- Question text-->
         <div class="question" id="question">
            Question will appear here
         </div>

         <!-- Answer options-->
          <div class="options" id="options">
            <button class="option" data-index="0">Option 1</button>
            <button class="option" data-index="1">Option 2</button>
            <button class="option" data-index="2">Option 3</button>
            <button class="option" data-index="3">Option 4</button>
          </div>
         
          <!-- Next button-->
        <button class="next-btn" id="next-btn">Next Question</button>

        <!-- Result screen (hidden initially) -->

         <div class="result-screen" id="result-screen" style="display: none;">
            <h2> Quiz Completed</h2>
            <div class="final-score"></div>
         <button class="restart-btn" id="restart-btn">Restart Quiz</button>
         </div>
        </div>

        <script>
        const questions = [
            {
                text: "What is the opposite of 'North'?",
                options: ["West", "South", "East", "North" ],
                correct: 1 // index 1 means the 2nd option (0,1,2,3,)
            },
            {
                text: "How many colours are there in a rainbow?",
                options: ["Seven", "Five", "Six", "Four"],
                correct: 0 
            },
            {
                text: "What is H2O more commonly know as?",
                options: ["Acid", "Salt", "Water", "Calcium"],
                correct: 2
            },
            {
                text: "What is the capital city of Liberia?",
                options: ["Montserrado", "Bensonville", "Conakry", "Monrovia"],
                correct: 3
            },
            {
                text: "Who painted the Mona Lisa?",
                options: ["Pablo Picasso", "Leonardo da Vinci", "Vincent Van Goh", "Claude Monet"],
                correct: 1
            }
        ];

        const questionEl = document.getElementById('question');
        const optionsContainer = document.getElementById('options');
        const scoreEl = document.getElementById('score');
        const questionNumberEl = document.getElementById('question-number');
        const nextBtn = document.getElementById('next-btn');
        const resultScreen = document.getElementById('result-screen');
        const finalScoreEl = document.getElementById('final-score');
        const restartBtn = document.getElementById('restart-btn');

        let currentQuestionIndex = 0;
        let score = 0;
        let answerLocked = false;

        function loadQuestion() {
            answerLocked = false;
            // remove any highlight or disabled classes from previous question 
            document.querySelectorAll('.option').forEach(btn => {
                btn.classList.remove('correct', 'wrong', 'disabled');
            });
            const q = questions[currentQuestionIndex];
            questionEl.textContent = q.text;
            const optionButtons = document.querySelectorAll('.option');
            for (let i = 0; i < optionButtons.length; i++) {
            optionButtons[i].textContent = q.options[i];
            optionButtons[i].dataset.index = i;
            }
            questionNumberEl.textContent = `Question ${currentQuestionIndex +1} / ${questions.length}`;
        }

        function onAnswerClick(e) {
            const btn = e.currentTarget;
            if (answerLocked) return;
            const selectedIndex = parseInt(btn.dataset.index);
            const currentQ = questions[currentQuestionIndex];
            const isCorrect = (selectedIndex === currentQ.correct);
            if (isCorrect) {
                score++;
                scoreEl.textContent = `Score: ${score}`;
                btn.classList.add('correct');
            } else {
                btn.classList.add('wrong');
                // highlight the correct answer in green
                const correctBtn = document.querySelector(`.option[data-index='${currentQ.correct}']`);
                if (correctBtn) {
                correctBtn.classList.add('correct');
                }
            }
            // disable all options so user can't change answer
            document.querySelectorAll('.option').forEach(opt => {
                opt.classList.add('disabled');
            });
            answerLocked = true;
        }

        function nextQuestion() {
            if (!answerLocked) {
                alert("please select an answer first.");
                return;
            }
            currentQuestionIndex++;
            if (currentQuestionIndex <questions.length) {
                loadQuestion();
            } else {
                endQuiz();
            }
        }

        function endQuiz() {
            // hide elements
            questionEl.style.display = 'none';
            document.querySelector('.quiz-header').style.display = 'none';
            // show result result screen
            resultScreen.style.display = 'block';
            finalScoreEl.textContent = `You got ${score} out of ${questions.lenth}`;
        }

        function restartQuiz() {
            currentQuestionIndex = 0;
            score = 0;
            scoreEl.textContent = `Score: 0`;
            answerLocked = false;

            resultScreen.style.display = 'none';
            questionEl.style.display = 'block';
            optionsContainer.style.display = 'block';
            nextBtn.style.display = 'block';
            document.querySelector('.quiz-header').style.display = 'flex';

            loadQuestion();
        }

        document.querySelectorAll('.option').forEach (btn => {
            btn.addEventListener('click', onAnswerClick);
        });
        nextBtn.addEventListener('click', nextQuestion);
        restartBtn.addEventListener('click', restartQuiz);

        loadQuestion();
        </script>
</body>
</html>
